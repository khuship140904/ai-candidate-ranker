ai_usage_summary: |
  Used Claude for architecture discussion.
  No candidate data was fed to any external LLM during ranking.

methodology_summary: |
  Rule-based ranker with five scoring components: job title match (40pts),
  career history keyword analysis (25pts), years of experience (15pts),
  location match (10pts), and behavioral signals (10pts). Title match is
  the decisive signal to avoid keyword-stuffer traps. Runtime is under
  2 minutes for 100K candidates on CPU.

